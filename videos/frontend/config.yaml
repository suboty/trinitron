frontend:
  camera:
    source_y: 0.0
    stages_y: -16.0
    pipeline_y: -32.0
    boundary_y: -48.0
    move_duration: 1.3
    frame_width: 8.0

  layout:
    content_left: -3.35
    content_right: 2.35
    content_offset_x: -0.42
    title_top: 6.20
    title_bottom: 4.45
    title_offset_x: 0.35
    animation_top: 4.15
    animation_bottom: -1.85
    text_top: -3.0
    text_bottom: -4.0
    subtitles_top: -4.30
    subtitles_bottom: -5.0

  typography:
    font: "Menlo"

  timing:
    title_fade: 0.7
    content_fade: 0.7
    text_change: 0.8
    subtitle_change: 1
    station_fade: 0.8
    normal_pause: 1
    final_hold: 2

  stations:
    source:
      number: "01"
      name: "SOURCE CODE"
      description: "One line, three transformations"
      color: "#52472E"
    stages:
      number: "02"
      name: "THREE STAGES"
      description: "Characters become meaning"
      color: "#076465"
    pipeline:
      number: "03"
      name: "COMPILER FRONTEND"
      description: "The complete architecture"
      color: "#5CA4A7"
    boundary:
      number: "04"
      name: "FRONTEND OUTPUT"
      description: "Ready for the next phase"
      color: "#52472E"

  source_station:
    code_y: 1.45
    code_font_size: 24
    code_box_width: 6.0
    code_box_height: 1.05
    code_box_corner_radius: 0.12
    code_box_stroke_width: 2.2
    code_box_fill_opacity: 0.045
    question_y: -0.25
    question_font_size: 20
    labels_y: -1.55
    label_gap: 0.24
    label_width: 1.55
    label_height: 0.52
    label_font_size: 13

  stages_station:
    top_y: 2.85
    stage_gap: 0.48
    stage_width: 5.25
    stage_height: 1.05
    stage_corner_radius: 0.12
    stage_stroke_width: 2.0
    stage_fill_opacity: 0.055
    name_font_size: 18
    transformation_font_size: 13
    arrow_length: 0.5
    arrow_stroke_width: 5.0
    highlight_duration: 1

  pipeline_station:
    source_x: -2.8
    source_y: 1.0
    source_width: 1.25
    source_height: 0.72
    stage_width: 1.35
    stage_height: 0.82
    lexer_x: -1.15
    parser_x: 0.45
    semantic_x: 2.05
    stage_y: 1.0
    output_y: 0
    arrow_stroke_width: 5
    box_corner_radius: 0.10
    box_stroke_width: 2.0
    box_fill_opacity: 0.065
    box_font_size: 13
    artifact_font_size: 14
    frontend_box_width: 5
    frontend_box_height: 2
    frontend_box_y: 0.6
    frontend_label_y: 2.2
    frontend_label_font_size: 20

  boundary_station:
    frontend_x: -1.55
    backend_x: 1.65
    block_y: 0.85
    block_width: 2.55
    block_height: 2.2
    block_corner_radius: 0.13
    block_stroke_width: 2.2
    block_fill_opacity: 0.055
    block_title_font_size: 18
    block_line_font_size: 12
    separator_x: 0.05
    separator_height: 2.75
    separator_stroke_width: 2.0
    arrow_y: -1.05
    arrow_stroke_width: 3.0
    ir_y: -2
    ir_width: 6
    ir_height: 1
    ir_font_size: 25

  style:
    badge_corner_radius: 0.09
    badge_stroke_width: 2.0
    badge_fill_opacity: 0.08

  text_area:
    font_size: 28
    line_spacing: 1.05
    max_width: 5.35
    lines:
      source: "The frontend does not execute code.\nIt tries to understand it."
      stages: "Each stage adds a new layer\nof structure and meaning."
      pipeline: "Together, these stages form\nthe compiler frontend."
      boundary: "The frontend understands the program.\nThe backend decides how to run it."

  subtitles:
    font_size: 28
    line_spacing: 1.05
    max_width: 5.30
    lines:
      source: "We explored lexical, syntax,\nand semantic analysis separately."
      source_question: "Now let us connect them\ninto one compiler pipeline."
      lexer: "The lexer turns characters\ninto a stream of tokens."
      parser: "The parser turns those tokens\ninto an abstract syntax tree."
      semantic: "Semantic analysis resolves names\nand checks whether \nthe program makes sense."
      pipeline: "This entire sequence is called\nthe compiler frontend."
      boundary: "Its output is a validated program,\nready to become intermediate representation."
      teaser: "But why does the compiler need IR\ninstead of generating machine code directly?"
